<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>

<body>
    <h1>Application Form</h1><br><br>
    <form action="">
        <label for="First Name">First Name</label>
        <input type="text">
        <label for="">Last Name</label>
        <input type="text"><br><br>
        <label for="">Date of Birth</label>
        <input type="date">
        <label for="">Age</label>
        <input type="number"><br><br>
        <label for="">Gender</label>
        <input type="radio" name="Gender">Male
        <input type="radio" name="Gender">Female <br><br>
        <label for="">Email Address</label>
        <input type="email" placeholder value="Enter email address"><br><br>
        <label for="">Positions Available:</label>
        <input type="radio" name="Positions Available">Junior Developer
        <input type="radio" name="Positions Available">Mid-level Developer
        <input type="radio" name="Positions Available"> Senior Developer <br><br>
        <label for="">Programming Languages:</label>
        <input type="checkbox" name="Programming Languages">Java
        <input type="checkbox" name="Programming Languages">JavaScript
        <input type="checkbox" name="Programming Languages">Python <br><br>
        <label for="">Password</label>
        <input type="password">
        <label for="">Confirm Password</label>
        <input type="password"><br><br>
        <input type="submit">
        <input type="reset">
    </form>




</body>

</html>
